<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слайдер</title>
    <style>
        .slider-box {
            margin-bottom: 30px;
        }

        .custom-slider {
            position: relative;
            width: 300px;
            height: 20px;
            cursor: pointer;
        }

        .track {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 5px;
        }

        .fill {
            position: absolute;
            top: 50%;
            height: 6px;
            background: #200136;
            border-radius: 5px;
        }

        .thumb {
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border: 4px solid #8d06e7;
            border-radius: 50%;
        }
        .value {
            margin-left: 10px;
            font-weight: bold;
        }
        .marks {
            position: relative;
            width: 300px;
            height: 15px;
            font-size: 15px;
            color: #000000;
        }
        
        .mark {
            position: absolute;
        }
    </style>
</head>
<body>
    <div class="slider-box">
        <h3>От 0 до 100</h3>
        <div class="custom-slider" id="s1" data-min="0" data-max="100" data-step="1">
            <div class="track"></div>
            <div class="fill"></div>
            <div class="thumb"></div>
        </div>
        <span class="value" id="v1">0</span>
    </div>

    <div class="slider-box">
        <h3>С привязкой по точкам</h3>
        <div class="custom-slider" id="s2" data-min="0" data-max="100" data-step="20">
            <div class="track"></div>
            <div class="fill"></div>
            <div class="thumb"></div>
        </div>
        <div class="marks">
            <span class="mark" style="left:0%">0</span>
            <span class="mark" style="left:20%">20</span>
            <span class="mark" style="left:40%">40</span>
            <span class="mark" style="left:60%">60</span>
            <span class="mark" style="left:80%">80</span>
            <span class="mark" style="left:100%">100</span>
        </div>
        <span class="value" id="v2">0</span>
    </div>

    <script>
        function createSlider(id, valId) {
            const slider = document.getElementById(id);
            const thumb = slider.querySelector('.thumb');
            const fill = slider.querySelector('.fill');
            const valDisplay = document.getElementById(valId);
            
            const min = +slider.dataset.min;
            const max = +slider.dataset.max;
            const step = +slider.dataset.step;
            
            let value = min, dragging = false;
            
            function setValue(v) {
                value = Math.max(min, Math.min(max, Math.round(v / step) * step));
                const pct = (value - min) / (max - min) * 100;
                thumb.style.left = pct + '%';
                fill.style.width = pct + '%';
                valDisplay.textContent = value;
            }
            
            function update(e) {
                const rect = slider.getBoundingClientRect();
                const x = (e.touches ? e.touches[0] : e).clientX - rect.left;
                setValue(min + (x / rect.width) * (max - min));
            }
            
            thumb.onmousedown = (e) => { e.stopPropagation(); dragging = true; };
            slider.onmousedown = (e) => { if(e.target !== thumb) update(e); };
            
            document.onmousemove = (e) => dragging && update(e);
            document.onmouseup = () => dragging = false;
            thumb.ontouchstart = (e) => { e.stopPropagation(); dragging = true; };
            slider.ontouchstart = (e) => { if(e.target !== thumb) update(e); };
            document.ontouchmove = (e) => dragging && update(e);
            document.ontouchend = () => dragging = false;
            
            setValue(min);
        }
        createSlider('s1', 'v1');
        createSlider('s2', 'v2');
    </script>
</body>
</html>
